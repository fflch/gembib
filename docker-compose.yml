services:
  gembib:
    image: gembib
    container_name: gembib
    ports:
      - "8000:80"
    depends_on:
      - mariadb
    networks:
      - gembib-network
    volumes:
      - ./:/var/www/html
      - storage_data:/var/www/html/storage
      - cache_data:/var/www/html/bootstrap/cache

  mariadb:
    image: mariadb:11
    container_name: gembib_mariadb
    restart: always
    environment:
      MYSQL_DATABASE: gembib
      MYSQL_USER: gembib
      MYSQL_PASSWORD: gembib
      MYSQL_ROOT_PASSWORD: gembib
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - gembib-network

networks:
  gembib-network:

volumes:
  mariadb_data:
  storage_data:
  cache_data: